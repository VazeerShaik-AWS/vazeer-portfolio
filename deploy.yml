name: Deploy to S3 + Invalidate Cache

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AKIAV4IMQKFJ2VTLPZ4D }}
          aws-secret-access-key: ${{ secrets.jtx40AyXiHxi3i1QfG+vuONWi3R7ych6kyVdvew+ }}
          aws-region: ap-south-1

      - name: Upload to S3
        run: aws s3 sync . s3://vazeer-portfolio --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation \
             --distribution-id EIOG7W8IY0H7H \
             --paths "/*"
